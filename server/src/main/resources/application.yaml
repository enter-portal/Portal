spring:

  application:
    name: portal

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portal_db}
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true